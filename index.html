<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adobe.com</title>
    <!-- favicon -->
    <link
      rel="icon"
      type="image/png"
      href="asset/favicon/favicon/apple-touch-icon.png"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="asset/favicon/favicon/favicon.svg"
    />
    <link rel="shortcut icon" href="asset/favicon/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="asset/favicon/favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="asset/favicon/favicon/site.webmanifest" />
    <!-- SEO -->
    <title>페이지 제목 | 사이트명</title>
    <meta name="description" content="페이지 내용을 간략하게 설명하는 문장" />
    <meta name="keywords" content="키워드1, 키워드2, 키워드3" />
    <meta name="author" content="사이트명 또는 작성자" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (SNS 공유용) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="페이지 제목" />
    <meta property="og:description" content="페이지 설명" />
    <meta property="og:image" content="https://example.com/image.jpg" />
    <meta property="og:url" content="https://example.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="페이지 제목" />
    <meta name="twitter:description" content="페이지 설명" />
    <meta name="twitter:image" content="https://example.com/image.jpg" />

    <!-- font aswome CDN-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- AOS CDN -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"
      integrity="sha512-A7AYk1fGKX6S2SsHywmPkrnzTZHrgiVT7GcQkLGDe2ev0aWb8zejytzS8wjo7PGEXKqJOrjQ4oORtnimIRZBtw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <!-- font -->
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap");
    </style>

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css" />
    <!-- JS -->
    <script src="JS/main.js"></script>
